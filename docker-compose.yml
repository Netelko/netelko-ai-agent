version: "3.9"

services:

  ollama:

    image: ollama/ollama

    container_name: ollama

    ports:
      - "11434:11434"

    volumes:
      - ollama:/root/.ollama

    restart: unless-stopped

  api:

    build: .

    container_name: netelko-ai-agent

    ports:
      - "8000:8000"

    depends_on:
      - ollama

    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db

    env_file:
      - .env

    restart: unless-stopped

volumes:

  ollama: